name: Bug Report
description: Report a reproducible bug
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Provide exact steps.
      placeholder: |
        1. Open model ...
        2. Switch to Test World 2 ...
        3. Run ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste key logs (e.g., cube_edge_guard) or attach screenshots.

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        - MATLAB version:
        - OS:
        - World: Test World 1 / 2
