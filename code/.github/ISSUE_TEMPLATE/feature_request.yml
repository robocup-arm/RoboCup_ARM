name: Feature Request
description: Suggest an improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the expected behavior and scope.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Which modules will be affected? (vision/planner/state machine/etc.)

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
